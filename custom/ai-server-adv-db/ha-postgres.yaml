apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: ai-postgres
  namespace: postgres-operator
spec:
  postgresVersion: 17
  # 家庭服务器环境下每天凌晨会有一次路由器重启，
  # Patroni 需要对短时网络抖动更宽容，避免因为几十秒到几分钟的
  # 控制面/网络闪断而触发不必要的故障转移。
  patroni:
    # CPK 实际使用 leaderLeaseDurationSeconds 控制 leader lock TTL；
    # 这里显式设为 90 秒，避免继续沿用默认 30 秒。
    leaderLeaseDurationSeconds: 90
    dynamicConfiguration:
      # Patroni 每 10 秒检查一次集群状态；保持默认量级，避免过于频繁地放大瞬时抖动。
      loop_wait: 10
      # 遇到 API / DCS / 网络短时异常时多给一些重试时间，减少误判。
      retry_timeout: 30
      # 当 Kubernetes API / DCS 短时不可达时尽可能保持当前主库继续服务，
      # 对家庭环境这种“已知会有短时网络抖动”的场景更友好。
      failsafe_mode: true
      # 不启用同步复制，避免副本抖动时把主库写入也一起拖慢或阻塞。
      synchronous_mode: false
  users:
  - name: longred
    databases:
    - ai-server-adv
    options: "SUPERUSER"

  - name: lunana
    databases:
    - Lunana
    - Lunana_db_lake

  config:
    parameters:
      # timescaledb 需要预加载，否则后续 CREATE EXTENSION 会报错。
      shared_preload_libraries: "timescaledb"
      # 当前活跃连接很少、空闲连接很多；收紧上限，逼业务更多走 PgBouncer，
      # 避免 backend 过多放大每连接内存与管理开销。
      max_connections: 600
      shared_buffers: "4GB"
      # 对容器化数据库而言，planner 看到的 OS page cache 不应直接按内存上限估算；
      # 保守一些更符合当前 12Gi limit / 8Gi request 的运行边界。
      effective_cache_size: "8GB"
      # work_mem 是按执行节点/排序/哈希分配的，不是实例总量；
      # 在较高连接数场景下保持保守，避免查询高峰时内存放大。
      work_mem: "32MB"
      # Hatchet 会产生较多写入和清理任务，适度提高 maintenance_work_mem
      # 有助于 vacuum / index maintenance，但避免一次性拉到过高造成内存挤压。
      maintenance_work_mem: "512MB"

      # 额外优化
      random_page_cost: "1.1"
      effective_io_concurrency: 200
      wal_buffers: "16MB"
      checkpoint_completion_target: "0.9"
      # 压缩 WAL，减少归档和复制链路上的 WAL 体积。
      wal_compression: "on"
      # Hatchet 写入密集时更大的 WAL 缓冲区能减少 checkpoint 抖动，
      # 这里改为更保守的上限，减少 pg_wal 的膨胀。
      max_wal_size: "2GB"
      # 为副本保留必要的追赶窗口，但不再保留过多本地 WAL。
      wal_keep_size: "2GB"
      # 放宽主从之间的复制超时，降低几十秒到数分钟网络抖动导致的复制连接误判。
      wal_sender_timeout: "180s"
      wal_receiver_timeout: "180s"
      # TCP keepalive 用于更温和地探测断连，避免过于激进或过于迟钝。
      tcp_keepalives_idle: 60
      tcp_keepalives_interval: 10
      tcp_keepalives_count: 6

      # Hatchet 的 workflow / step / event 表更容易出现高 churn 和表膨胀；
      # 在不显著放大后台资源竞争的前提下，适度提高 autovacuum 积极性。
      autovacuum_max_workers: 5
      autovacuum_vacuum_scale_factor: "0.1"
      autovacuum_analyze_scale_factor: "0.05"
      autovacuum_vacuum_threshold: 25
      autovacuum_analyze_threshold: 25
      autovacuum_vacuum_cost_delay: "10ms"
      autovacuum_vacuum_cost_limit: 1000

  instances:
  - name: pgha
    replicas: 1
    resources:
      limits:
        cpu: "8"
        # 运行中主库 database 容器已接近 10Gi；适度上调 limit，
        # 给 autovacuum / checkpoint / 短时连接峰值留出安全余量。
        memory: "16Gi"
      requests:
        # 主库实测常态内存已明显高于 8Gi；提高 request，避免调度器低估数据库负载。
        cpu: "2"
        memory: "12Gi"
    dataVolumeClaimSpec:
      accessModes:
      - "ReadWriteOnce"
      resources:
        requests:
          storage: 120Gi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - adtiger-4090x8
        - weight: 60
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - adtiger-eq
              - adtiger-eq-2
              - adtiger-eq-3
              - adtiger-rtx-pro-6000
        # - weight: 50
        #   preference:
        #     matchExpressions:
        #       - key: node-role.kubernetes.io/control-plane
        #         operator: Exists
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/cluster: ai-postgres
                postgres-operator.crunchydata.com/instance-set: pgha
  backups:
    pgbackrest:
      global:
        # 至少保留 2 个全量备份，避免在单次备份异常后过快丢失回滚窗口。
        repo1-retention-full: "2"
        # 在每周全量备份之间保留一周内的增量链，兼顾恢复点和 repo 占用。
        repo1-retention-diff: "6"
        # WAL 归档只保留最近 1 个全量备份窗口，明显降低仓库里的 WAL 占用。
        repo1-retention-archive: "1"
      jobs:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                  - adtiger-3090x2
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                  - adtiger-eq
                  - adtiger-eq-2
                  - adtiger-eq-3
      repos:
      - name: repo1
        schedules:
          # 每周日凌晨执行一次全量备份，推动旧 WAL 具备过期条件。
          full: "0 3 * * 0"
          # 其余每天凌晨执行一次增量备份，缩短恢复窗口并持续推进备份链。
          incremental: "0 3 * * 1-6"
        volume:
          volumeClaimSpec:
            accessModes:
            - "ReadWriteOnce"
            resources:
              requests:
                storage: 400Gi

  proxy:
    pgBouncer:
      pgBouncer:
      replicas: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  postgres-operator.crunchydata.com/cluster: ai-postgres
                  postgres-operator.crunchydata.com/role: pgbouncer
