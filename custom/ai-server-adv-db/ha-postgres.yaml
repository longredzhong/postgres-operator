apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: ai-postgres
spec:
  postgresVersion: 17
  users:
    - name: longred
      databases:
        - ai-server-adv
      options: "SUPERUSER"
  config:
    parameters:
      # 当前活跃连接远低于 600，配合 PgBouncer 先收敛到更稳妥的上限，
      # 避免 backend 进程过多并放大 work_mem 的内存风险。
      max_connections: 300
      shared_buffers: "4GB"
      effective_cache_size: "12GB"
      # work_mem 是按执行节点/排序/哈希分配的，不是实例总量；
      # 在较高连接数场景下保持保守，避免查询高峰时内存放大。
      work_mem: "32MB"
      maintenance_work_mem: "256MB"

      # 额外优化
      random_page_cost: "1.1"
      effective_io_concurrency: 200
      wal_buffers: "16MB"
      checkpoint_completion_target: "0.9"

  instances:
    - name: pgha
      replicas: 3
      resources:
        limits:
          cpu: "4"
          memory: "16Gi"
        requests:
          cpu: "1"
          memory: "16Gi"
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 40Gi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - adtiger-4090x8
                      - adtiger-rtx-pro-6000
                      - adtiger-eq
                      - adtiger-eq-2
                      - adtiger-eq-3
            # - weight: 50
            #   preference:
            #     matchExpressions:
            #       - key: node-role.kubernetes.io/control-plane
            #         operator: Exists
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: ai-postgres
                    postgres-operator.crunchydata.com/instance-set: pgha
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 200Gi

  proxy:
    pgBouncer:
      pgBouncer:
      replicas: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: ai-postgres
                    postgres-operator.crunchydata.com/role: pgbouncer
