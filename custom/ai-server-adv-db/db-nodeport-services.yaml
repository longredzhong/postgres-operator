apiVersion: v1
kind: Service
metadata:
  name: ai-postgres-primary-nodeport
spec:
  type: NodePort
  selector:
    postgres-operator.crunchydata.com/cluster: ai-postgres
    postgres-operator.crunchydata.com/role: master
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    nodePort: 30434
---
apiVersion: v1
kind: Service
metadata:
  name: ai-postgres-pgbouncer-nodeport
spec:
  type: NodePort
  selector:
    postgres-operator.crunchydata.com/cluster: ai-postgres
    postgres-operator.crunchydata.com/role: pgbouncer
  ports:
  - name: postgres
    port: 5432
    targetPort: pgbouncer
    nodePort: 30433
